version: '3.9'
services:
  auth-service:
    build: ./auth-service
    ports: ['3000:3000']
    env_file: .env
    environment:
      - PORT=3000
    networks: [stayease-net]

  listing-service:
    build: ./listing-service
    ports: ['3001:3001']
    env_file: .env
    environment:
      - PORT=3001
    networks: [stayease-net]

  reservation-service:
    build: ./reservation-service
    ports: ['3002:3002']
    env_file: .env
    environment:
      - PORT=3002
    networks: [stayease-net]

  notification-service:
    build: ./notification-service
    ports: ['3003:3003']
    env_file: .env
    environment:
      - PORT=3003
    networks: [stayease-net]

networks:
  stayease-net:
    driver: bridge
