version: '3.9'
services:
  auth-service:
    build: ./auth-service
    ports: ['3000:3000']
    env_file: .env
    depends_on: [mongo]
    networks: [stayease-net]

  listing-service:
    build: ./listing-service
    ports: ['3001:3001']
    env_file: .env
    depends_on: [mongo]
    networks: [stayease-net]

  reservation-service:
    build: ./reservation-service
    ports: ['3002:3002']
    env_file: .env
    depends_on: [mongo]
    networks: [stayease-net]

  notification-service:
    build: ./notification-service
    ports: ['3003:3003']
    env_file: .env
    depends_on: [mongo]
    networks: [stayease-net]

  mongo:
    image: mongo:7
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
    networks: [stayease-net]

volumes:
  mongo_data:
networks:
  stayease-net:
    driver: bridge
